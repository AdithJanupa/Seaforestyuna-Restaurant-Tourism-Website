<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaForestuna | Login and Register</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: { 900: '#04070a', 800: '#0a1116', 700: '#111a21' },
              sea: { 500: '#c8a46a', 400: '#e3c58a' },
              sun: { 300: '#b88b4d' },
              sand: { 100: '#f2eadc', 200: '#dcc8a6' }
            },
            fontFamily: {
              display: ['Bodoni Moda', 'serif'],
              body: ['Outfit', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__inner">
          <a href="index.html" class="auth-back-link">
            <span aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path
                  d="M15.7 5.3a1 1 0 0 1 0 1.4L10.41 12l5.29 5.3a1 1 0 1 1-1.41 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0Z"
                  fill="currentColor"
                />
              </svg>
            </span>
            <span>Back</span>
          </a>

          <div class="auth-brand">
            <span class="auth-logo-wrap">
              <img src="assets/images/logo.png" alt="SeaForestuna logo" class="auth-logo" />
            </span>
            <span class="auth-brand-chip">SeaForestuna Access</span>
          </div>

          <div class="auth-copy">
            <p class="auth-overline">Restaurant and tourism portal</p>
            <h1 id="authTitle" class="display auth-title">Login to your account</h1>
            <p id="authSubtitle" class="auth-subtitle">
              Sign in with your email and password to continue booking rooms, meals, and seaside experiences.
            </p>
          </div>

          <div class="auth-toggle" role="tablist" aria-label="Authentication options">
            <button type="button" class="auth-toggle__btn is-active" data-auth-tab="login" aria-selected="true">
              Login
            </button>
            <button type="button" class="auth-toggle__btn" data-auth-tab="register" aria-selected="false">
              Create Account
            </button>
          </div>

          <div class="auth-panel is-active" data-auth-panel="login">
            <form id="loginForm" class="auth-form">
              <label class="auth-field">
                <span>Email</span>
                <input
                  name="email"
                  type="email"
                  class="input-field auth-input"
                  placeholder="name@email.com"
                  autocomplete="email"
                  required
                />
              </label>

              <label class="auth-field">
                <span>Password</span>
                <input
                  name="password"
                  type="password"
                  class="input-field auth-input"
                  placeholder="Enter password"
                  autocomplete="current-password"
                  required
                />
              </label>

              <button class="auth-submit" type="submit">
                <span class="auth-submit__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path
                      d="M10 17a1 1 0 0 1-.7-.3l-4-4a1 1 0 1 1 1.4-1.4l2.3 2.3V4a1 1 0 1 1 2 0v9.6l2.3-2.3a1 1 0 1 1 1.4 1.4l-4 4A1 1 0 0 1 10 17Zm6-11h3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-9a2 2 0 0 1-2-2v-2a1 1 0 1 1 2 0v2h9V8h-3a1 1 0 1 1 0-2Z"
                      fill="currentColor"
                    />
                  </svg>
                </span>
                <span>Login</span>
              </button>
            </form>

            <p class="auth-helper">
              No account?
              <button type="button" class="auth-inline-link" data-auth-switch="register">Create account</button>
            </p>
          </div>

          <div class="auth-panel" data-auth-panel="register" hidden>
            <form id="registerForm" class="auth-form">
              <label class="auth-field">
                <span>Full Name</span>
                <input
                  name="name"
                  type="text"
                  class="input-field auth-input"
                  placeholder="Enter your full name"
                  autocomplete="name"
                  required
                />
              </label>

              <label class="auth-field">
                <span>Email</span>
                <input
                  name="email"
                  type="email"
                  class="input-field auth-input"
                  placeholder="name@email.com"
                  autocomplete="email"
                  required
                />
              </label>

              <label class="auth-field">
                <span>Password</span>
                <input
                  name="password"
                  type="password"
                  class="input-field auth-input"
                  placeholder="Create password"
                  autocomplete="new-password"
                  required
                />
              </label>

              <label class="auth-field">
                <span>Confirm Password</span>
                <input
                  name="confirmPassword"
                  type="password"
                  class="input-field auth-input"
                  placeholder="Re-enter password"
                  autocomplete="new-password"
                  required
                />
              </label>

              <button class="auth-submit" type="submit">
                <span class="auth-submit__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path
                      d="M12 3a5 5 0 0 1 5 5v1h1a2 2 0 0 1 2 2v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a2 2 0 0 1 2-2h1V8a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v1h6V8a3 3 0 0 0-3-3Zm0 7a1 1 0 0 1 1 1v1.2a2 2 0 1 1-2 0V13a1 1 0 0 1 1-1Z"
                      fill="currentColor"
                    />
                  </svg>
                </span>
                <span>Create Account</span>
              </button>
            </form>

            <p class="auth-helper">
              Already have an account?
              <button type="button" class="auth-inline-link" data-auth-switch="login">Login here</button>
            </p>
          </div>

          <div class="auth-status-card">
            <div>
              <p class="auth-status-card__label">Account Status</p>
              <p id="userBadge" class="auth-status-card__value">Not logged in</p>
            </div>
            <button id="logoutBtn" class="auth-status-card__btn" type="button">Logout</button>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
