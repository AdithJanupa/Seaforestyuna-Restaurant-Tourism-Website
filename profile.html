<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaForestuna | My Profile</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: { 900: '#04070a', 800: '#0a1116', 700: '#111a21' },
              sea: { 500: '#c8a46a', 400: '#e3c58a' },
              sun: { 300: '#b88b4d' },
              sand: { 100: '#f2eadc', 200: '#dcc8a6' }
            },
            fontFamily: {
              display: ['Bodoni Moda', 'serif'],
              body: ['Outfit', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="profile-page text-white">
    <header data-component="navbar"></header>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
      <section class="profile-header reveal">
        <div class="profile-header__intro">
          <span class="profile-header__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M12 3a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 12c4.4 0 8 2.2 8 5a1 1 0 1 1-2 0c0-1.3-2.4-3-6-3s-6 1.7-6 3a1 1 0 1 1-2 0c0-2.8 3.6-5 8-5Z" fill="currentColor"/>
            </svg>
          </span>
          <div>
            <h1 class="display text-5xl">My Profile</h1>
            <p class="profile-header__subtitle">Manage your account details with the SeaForestuna website theme.</p>
          </div>
        </div>

        <button id="profileLogoutBtn" class="profile-logout-btn" type="button" aria-label="Logout" title="Logout">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M15 3a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0V5H8v14h6v-2a1 1 0 1 1 2 0v3a1 1 0 0 1-1 1H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8Zm1.3 5.3a1 1 0 0 1 1.4 0l3.99 4a1 1 0 0 1 0 1.4l-4 4a1 1 0 1 1-1.4-1.4l2.3-2.3H11a1 1 0 1 1 0-2h7.6l-2.3-2.3a1 1 0 0 1 0-1.4Z" fill="currentColor"/>
          </svg>
        </button>
      </section>

      <section class="profile-layout">
        <aside class="profile-summary-card glass-card reveal">
          <div class="profile-avatar" id="profileAvatar">SF</div>
          <h2 class="profile-summary-card__name" id="profileSummaryName">SeaForestuna User</h2>
          <p class="profile-role-pill" id="profileSummaryRole">Guest</p>
          <p class="profile-summary-card__email" id="profileSummaryEmail">Not logged in</p>
          <p class="profile-summary-card__meta" id="profileSummaryUpdated">Last updated: just now</p>
        </aside>

        <section class="profile-editor-card glass-card reveal">
          <div class="profile-editor-card__head">
            <div class="profile-editor-card__title">
              <span aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M15.2 3.2a2.8 2.8 0 0 1 4 4L9.7 16.7 5 18l1.3-4.7L15.2 3.2Zm1.4 1.4-8.9 8.9-.5 1.9 1.9-.5 8.9-8.9a.8.8 0 1 0-1.4-1.4ZM4 5a1 1 0 0 1 1-1h5a1 1 0 1 1 0 2H6v12h12v-4a1 1 0 1 1 2 0v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5Z" fill="currentColor"/>
                </svg>
              </span>
              <h2 class="display text-3xl">Edit Profile</h2>
            </div>
            <div class="profile-editor-card__rule"></div>
          </div>

          <form id="profileForm" class="profile-form">
            <div class="profile-form-grid">
              <label class="profile-field">
                <span>Email</span>
                <input id="profileEmail" name="email" type="email" class="input-field profile-input profile-input--locked" readonly />
              </label>

              <label class="profile-field">
                <span>Role</span>
                <input id="profileRole" name="role" type="text" class="input-field profile-input profile-input--locked" readonly />
              </label>

              <label class="profile-field">
                <span>Display Name</span>
                <input id="profileDisplayName" name="displayName" type="text" class="input-field profile-input" required />
              </label>

              <label class="profile-field">
                <span>Phone</span>
                <input id="profilePhone" name="phone" type="text" class="input-field profile-input" />
              </label>

              <label class="profile-field profile-field--wide">
                <span>Location</span>
                <input id="profileLocation" name="location" type="text" class="input-field profile-input" />
              </label>

              <label class="profile-field profile-field--wide">
                <span>Bio</span>
                <textarea id="profileBio" name="bio" class="input-field profile-input profile-textarea" rows="5"></textarea>
              </label>
            </div>

            <div class="profile-form__actions">
              <button class="btn-primary profile-save-btn" type="submit">
                <span aria-hidden="true">
                  <svg viewBox="0 0 24 24" role="img">
                    <path d="M6 3h10.6a2 2 0 0 1 1.4.6l2.4 2.4a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h1Zm1 2H5v14h14V8.4L15.6 5H15v4a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V5Zm2 0v4h4V5H9Zm-1 9a1 1 0 0 1 1-1h6a1 1 0 1 1 0 2H9a1 1 0 0 1-1-1Z" fill="currentColor"/>
                  </svg>
                </span>
                <span>Save Profile</span>
              </button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <footer data-component="footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/profile.js"></script>
  </body>
</html>
