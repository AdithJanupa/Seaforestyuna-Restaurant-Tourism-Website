<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaForestuna | Menu and Ordering</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: { 900: '#04070a', 800: '#0a1116', 700: '#111a21' },
              sea: { 500: '#c8a46a', 400: '#e3c58a' },
              sun: { 300: '#b88b4d' },
              sand: { 100: '#f2eadc', 200: '#dcc8a6' }
            },
            fontFamily: {
              display: ['Bodoni Moda', 'serif'],
              body: ['Outfit', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="text-white">
    <header data-component="navbar"></header>

    <section class="pt-32 pb-16 max-w-7xl mx-auto px-6">
      <div class="grid lg:grid-cols-[1.05fr_0.95fr] gap-10 items-center">
        <div class="space-y-4">
          <span class="badge">Dining Atlas</span>
          <h1 class="display text-5xl">Menu, Ordering, and Travel-Ready Plates</h1>
          <p class="text-white/70">
            Curate a dining itinerary with pickup, dine-in, or delivery. Lock a time slot, then let our kitchen stage the
            experience for your arrival.
          </p>
          <button class="btn-outline" id="cartToggle">Open Cart (<span id="cartCount">0</span>)</button>
        </div>
        <div class="image-card">
          <img data-img="menuHero" alt="Menu hero" />
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-10">
      <div class="flex flex-wrap gap-3" id="menuCategories"></div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-16">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="menuList"></div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-20">
      <div class="glass-card p-8">
        <div class="flex items-center gap-4 mb-6">
          <div class="progress-step active"><span class="progress-dot"></span>Cart</div>
          <div class="progress-step"><span class="progress-dot"></span>Details</div>
          <div class="progress-step"><span class="progress-dot"></span>Confirm</div>
        </div>
        <form id="orderForm" class="grid lg:grid-cols-2 gap-6">
          <div class="space-y-4">
            <h3 class="text-2xl display">Order Details</h3>
            <div>
              <label class="text-sm text-white/70">Order Type</label>
              <div class="flex gap-4 mt-2">
                <label class="flex items-center gap-2 text-sm"><input type="radio" name="orderType" value="pickup" checked /> Pickup</label>
                <label class="flex items-center gap-2 text-sm"><input type="radio" name="orderType" value="dine-in" /> Dine-in</label>
                <label class="flex items-center gap-2 text-sm"><input type="radio" name="orderType" value="delivery" /> Delivery</label>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-sm text-white/70">Date</label>
                <input id="orderDate" name="orderDate" type="date" class="input-field mt-1" required />
              </div>
              <div>
                <label class="text-sm text-white/70">Time</label>
                <select id="orderTime" name="orderTime" class="input-field mt-1"></select>
              </div>
            </div>
            <div id="deliveryFields" class="space-y-3 hidden">
              <div>
                <label class="text-sm text-white/70">Delivery Address</label>
                <input name="address" type="text" class="input-field mt-1" />
              </div>
              <div>
                <label class="text-sm text-white/70">Phone</label>
                <input name="phone" type="text" class="input-field mt-1" />
              </div>
            </div>
            <div id="dineInFields" class="space-y-3 hidden">
              <div>
                <label class="text-sm text-white/70">Guest Count</label>
                <input name="guestCount" type="number" min="1" class="input-field mt-1" />
              </div>
              <div>
                <label class="text-sm text-white/70">Table Preference (optional)</label>
                <input name="tablePreference" type="text" class="input-field mt-1" />
              </div>
            </div>
            <div>
              <label class="text-sm text-white/70">Notes</label>
              <textarea name="notes" class="input-field mt-1" rows="3" placeholder="Allergies, special requests"></textarea>
            </div>
          </div>
          <div class="space-y-4">
            <h3 class="text-2xl display">Cart Summary</h3>
            <div id="cartItems" class="space-y-3"></div>
            <div class="flex justify-between text-white/80">
              <span>Subtotal</span>
              <span id="cartTotal">$0.00</span>
            </div>
            <button type="submit" class="btn-primary w-full">Submit Order</button>
            <div id="orderConfirmation"></div>
          </div>
        </form>
      </div>
    </section>

    <div id="cartDrawer" class="fixed top-0 right-0 w-80 h-full bg-ink-800/95 p-6 transform translate-x-full transition-transform z-40">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl display">Your Cart</h3>
        <button id="cartClose" class="text-white/60">Close</button>
      </div>
      <div id="cartDrawerItems"></div>
    </div>

    <div id="itemModal" class="modal-backdrop">
      <div class="modal-panel" id="itemModalContent"></div>
    </div>

    <footer data-component="footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/menu.js"></script>
  </body>
</html>
